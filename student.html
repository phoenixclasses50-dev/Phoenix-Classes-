<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#ff6b00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Phoenix Classes"/>
<title>Phoenix Classes — Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4ff;
  --bg2:#e8eeff;
  --card:#ffffff;
  --card2:rgba(255,255,255,0.7);
  --border:rgba(99,102,241,0.12);
  --text:#1a1d3a;
  --muted:#6b7280;
  --accent:#f97316;
  --accent2:#ea580c;
  --accentLight:rgba(249,115,22,0.12);
  --green:#10b981;
  --greenLight:rgba(16,185,129,0.12);
  --red:#ef4444;
  --redLight:rgba(239,68,68,0.1);
  --blue:#6366f1;
  --blueLight:rgba(99,102,241,0.1);
  --purple:#8b5cf6;
  --yellow:#f59e0b;
  --shadow:0 4px 24px rgba(99,102,241,0.10);
  --shadow-lg:0 8px 40px rgba(99,102,241,0.16);
  --radius:18px;
  --radius-sm:12px;
  --font:'Nunito',sans-serif;
  --font-head:'Sora',sans-serif;
}
.dark-mode{
  --bg:#0d0f1e;
  --bg2:#111427;
  --card:#161929;
  --card2:rgba(22,25,41,0.85);
  --border:rgba(99,102,241,0.18);
  --text:#e8eaff;
  --muted:#7b80a0;
  --accentLight:rgba(249,115,22,0.15);
  --greenLight:rgba(16,185,129,0.12);
  --redLight:rgba(239,68,68,0.12);
  --blueLight:rgba(99,102,241,0.12);
  --shadow:0 4px 24px rgba(0,0,0,0.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);
  font-family:var(--font);
  color:var(--text);
  font-size:14px;
  min-height:100vh;
  transition:background .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}

/* Background pattern */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(249,115,22,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.08) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
#root{position:relative;z-index:1;}

.main{padding:16px 14px 80px;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
  height:64px;
  padding:0 8px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 -4px 24px rgba(0,0,0,0.08);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);
  font-size:9px;gap:3px;
  font-weight:700;letter-spacing:0.3px;
  font-family:var(--font);
  transition:all .2s;
  border-radius:12px;
  margin:6px 2px;
}
.bn-item.active{
  color:var(--accent);
  background:var(--accentLight);
}
.bn-icon{font-size:20px;line-height:1;}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  transition:all .2s;
}
.glass-card{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow);
}
.card-title{
  font-family:var(--font-head);
  font-size:11px;
  font-weight:800;
  color:var(--accent);
  margin-bottom:14px;
  text-transform:uppercase;
  letter-spacing:1px;
  display:flex;
  align-items:center;
  gap:6px;
}
.card-title::after{
  content:'';flex:1;height:1px;
  background:var(--border);
}

/* ── GRIDS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}

/* ── STAT CARDS ── */
.stat-card{
  border-radius:var(--radius-sm);
  padding:14px 12px;
  position:relative;
  overflow:hidden;
  text-align:center;
}
.stat-card::before{
  content:'';position:absolute;
  bottom:-10px;right:-10px;
  width:50px;height:50px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
}
.stat-num{
  font-family:var(--font-head);
  font-size:20px;
  font-weight:800;
  line-height:1.1;
}
.stat-label{
  font-size:9px;
  color:rgba(255,255,255,0.8);
  margin-top:3px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

/* ── FORM ELEMENTS ── */
label{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
input,select,textarea{
  width:100%;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  padding:11px 14px;
  font-size:14px;
  outline:none;
  box-sizing:border-box;
  font-family:var(--font);
  font-weight:600;
  transition:all .2s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accentLight);
  background:var(--card);
}

/* ── BUTTONS ── */
.btn{
  color:#fff;border:none;
  border-radius:var(--radius-sm);
  padding:13px 16px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  width:100%;
  margin-top:8px;
  font-family:var(--font);
  letter-spacing:0.2px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(0.97);}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 4px 16px rgba(249,115,22,0.35);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 4px 16px rgba(16,185,129,0.35);}
.btn-blue{background:linear-gradient(135deg,#6366f1,#4f46e5);box-shadow:0 4px 16px rgba(99,102,241,0.35);}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);box-shadow:0 4px 16px rgba(139,92,246,0.35);}
.btn-gray{background:var(--bg2);color:var(--muted);box-shadow:none;}
.btn-sm{
  color:#fff;border:none;
  border-radius:8px;
  padding:6px 12px;
  font-size:11px;font-weight:800;
  cursor:pointer;
  font-family:var(--font);
  background:linear-gradient(135deg,#f97316,#ea580c);
}

/* ── BADGES ── */
.badge{
  border-radius:20px;
  padding:3px 10px;
  font-size:11px;
  font-weight:800;
  display:inline-block;
  letter-spacing:0.2px;
}

/* ── TABLE ── */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
th{
  text-align:left;padding:8px 8px;
  font-size:10px;font-weight:800;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  border-bottom:2px solid var(--border);
}
td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* ── BARS ── */
.bar-wrap{margin-bottom:10px;}
.bar-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.bar-bg{background:var(--bg2);border-radius:20px;height:10px;overflow:hidden;}
.bar-fill{height:10px;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  background:linear-gradient(160deg, #fff7ed 0%, #fef3c7 30%, #ede9fe 70%, #dbeafe 100%);
  position:relative;overflow:hidden;
}
.dark-mode .login-wrap{
  background:linear-gradient(160deg,#0d0f1e 0%,#111427 50%,#0f0a1e 100%);
}
.login-wrap::before{
  content:'';position:absolute;
  top:-100px;left:-100px;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(249,115,22,0.15) 0%,transparent 70%);
}
.login-wrap::after{
  content:'';position:absolute;
  bottom:-80px;right:-80px;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);
}
.login-card{
  background:rgba(255,255,255,0.85);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:24px;
  padding:28px;
  width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(249,115,22,0.15),0 4px 16px rgba(0,0,0,0.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:relative;z-index:1;
}
.dark-mode .login-card{
  background:rgba(22,25,41,0.9);
  border:1px solid rgba(99,102,241,0.2);
}
.login-logo-wrap{
  text-align:center;
  margin-bottom:28px;
}
.login-brand{
  font-family:var(--font-head);
  font-size:26px;
  font-weight:800;
  background:linear-gradient(135deg,#f97316,#ea580c);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-top:8px;
}
.login-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}
.login-title{font-family:var(--font-head);font-weight:800;font-size:18px;margin-bottom:4px;text-align:center;}

/* ── HEADER HERO ── */
.hero-card{
  background:linear-gradient(135deg,#f97316 0%,#ea580c 60%,#dc2626 100%);
  border-radius:var(--radius);
  padding:18px 16px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(249,115,22,0.35);
}
.hero-card::before{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:150px;height:150px;
  border-radius:50%;
  background:rgba(255,255,255,0.07);
}
.hero-card::after{
  content:'';position:absolute;
  bottom:-30px;left:40px;
  width:100px;height:100px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
}
.hero-avatar{
  width:48px;height:48px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  border:2.5px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);
  font-size:20px;font-weight:800;
  color:#fff;flex-shrink:0;
  backdrop-filter:blur(4px);
}

/* ── SCHEDULE ── */
.schedule-item{
  padding:13px;
  border-radius:var(--radius-sm);
  margin-bottom:8px;
  background:var(--bg);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  display:flex;
  align-items:center;
  gap:12px;
}
.days-badge{
  min-width:48px;
  text-align:center;
  border-radius:10px;
  padding:6px 10px;
  flex-shrink:0;
}

/* ── RANK ── */
.rank-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 8px;
  border-radius:10px;
  margin-bottom:2px;
  transition:background .15s;
}
.rank-num{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;flex-shrink:0;
  font-family:var(--font-head);
}

/* ── NOTICE ── */
.notice-item{
  padding:13px;border-radius:var(--radius-sm);
  background:var(--bg);
  border:1px solid var(--border);
  border-left:3px solid var(--blue);
  margin-bottom:8px;
}

/* ── MATERIAL ITEM ── */
.material-item{
  display:flex;gap:12px;align-items:center;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}
.material-item:last-child{border-bottom:none;}
.mat-icon{
  width:44px;height:44px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}

/* ── ID CARD ── */
.id-card{
  background:linear-gradient(135deg,#f97316 0%,#ea580c 50%,#c2410c 100%);
  border-radius:20px;padding:22px;
  color:#fff;position:relative;overflow:hidden;
  margin-bottom:14px;
  box-shadow:0 12px 40px rgba(249,115,22,0.35);
}
.id-card::before{
  content:'🔥';position:absolute;
  right:-15px;bottom:-25px;
  font-size:110px;opacity:0.08;
}

/* ── MORE GRID ── */
.more-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  box-shadow:var(--shadow);
}
.more-item:active{transform:scale(0.95);}
.more-item-icon{font-size:30px;margin-bottom:8px;}
.more-item-label{font-weight:800;font-size:12px;font-family:var(--font-head);}

/* ── FEEDBACK ── */
.feedback-sent{
  background:var(--greenLight);
  border:1px solid var(--green);
  border-radius:var(--radius-sm);
  padding:24px;text-align:center;
}
.star-btn{
  cursor:pointer;
  font-size:28px;
  transition:transform .1s;
  line-height:1;
}
.star-btn:active{transform:scale(1.3);}

/* ── TOAST ── */
.toast{
  position:fixed;
  bottom:76px;
  left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;
  padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:800;
  z-index:9999;display:none;
  white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,0.2);
  font-family:var(--font);
  animation:toastIn .2s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.toast.err{background:var(--red);}

/* ── TOP CONTROLS ── */
.top-btns{position:fixed;top:12px;right:12px;z-index:200;display:flex;gap:6px;}
.top-btn{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:7px 11px;
  cursor:pointer;
  font-size:14px;
  color:var(--text);
  font-family:var(--font);
  font-weight:700;
  box-shadow:var(--shadow);
  transition:all .15s;
}
.top-btn:active{transform:scale(0.95);}

/* ── PAGE HEADER ── */
.page-header{
  display:flex;justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
.page-title{
  font-family:var(--font-head);
  font-size:18px;
  font-weight:800;
  color:var(--accent);
}

/* ── MINI CHART BARS ── */
.chart-bar-wrap{display:flex;gap:6px;align-items:flex-end;padding:4px 0;height:80px;}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;}
.chart-bar-pct{font-size:9px;color:var(--muted);font-weight:800;}
.chart-bar-bg{width:100%;background:var(--bg2);border-radius:6px;flex:1;display:flex;align-items:flex-end;overflow:hidden;}
.chart-bar-fill{width:100%;border-radius:6px;transition:height .5s ease;}
.chart-bar-name{font-size:9px;color:var(--muted);text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:38px;font-weight:700;}

/* ── ATTENDANCE WARNING ── */
.att-warning{
  background:var(--redLight);
  border:1px solid var(--red);
  border-radius:var(--radius-sm);
  padding:14px;
  margin-bottom:12px;
  display:flex;gap:12px;align-items:center;
}

/* ── STAR BANNER ── */
.star-banner{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  border-radius:var(--radius-sm);
  padding:16px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 6px 20px rgba(245,158,11,0.3);
}

/* ── SECTION DIVIDER ── */
.mb{margin-bottom:12px;}
.empty{color:var(--muted);text-align:center;padding:32px 24px;font-size:13px;font-weight:600;}

/* ── PRINT ── */
@media print{
  .bottom-nav,.top-btns,.btn,.no-print{display:none!important;}
  body{background:#fff!important;color:#000!important;}
  body::before{display:none;}
  .main{padding:0!important;}
  .card{break-inside:avoid;border:1px solid #ddd!important;box-shadow:none!important;}
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fadeUp .3s ease forwards;}
.anim-d1{animation-delay:.05s;opacity:0;}
.anim-d2{animation-delay:.10s;opacity:0;}
.anim-d3{animation-delay:.15s;opacity:0;}
.anim-d4{animation-delay:.20s;opacity:0;}

/* ── PILL TAGS ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:800;
  letter-spacing:0.2px;
}

/* ── UPI BUTTON ── */
.upi-btn{
  background:linear-gradient(135deg,#5f259f,#7c3aed);
  color:#fff;border:none;
  border-radius:var(--radius-sm);
  padding:14px;font-size:14px;font-weight:800;
  cursor:pointer;width:100%;margin-bottom:12px;
  font-family:var(--font);
  box-shadow:0 6px 20px rgba(124,58,237,0.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.upi-btn:active{transform:scale(0.97);}

/* ── LOADING ── */
.loading-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
}
.loading-dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce .8s infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.30s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.5;}40%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwaUavuI_smkH4fvBEQesJkZfX3wEODYuhtfb9X2WvuP-qZrqf_b49rgGLm4dgfCrEX/exec';

C351,186 355,172 353,160 C357,175 353,196 347,208 C344,216 342,225 340,234Z" fill="url(#lb3)" opacity="0.9"/></svg>';

var DB={students:[],attendance:{},marks:{tests:[],data:{}},fees:{classFee:{},payments:{}},notices:[],schedule:[],starStudent:null,feedback:[],materials:[],homework:{}};
var currentStudent=null;
var pg='home';
var loaded=false;

function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(err?' err':'');
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function bdg(t,c){
  return '<span class="badge" style="background:'+c+'20;color:'+c+';border:1px solid '+c+'30">'+t+'</span>';
}

function sc(n,l,bg,color){
  color=color||'#fff';
  return '<div class="stat-card" style="background:'+bg+'"><div class="stat-num" style="color:'+color+'">'+n+'</div><div class="stat-label">'+l+'</div></div>';
}

function bar(label,val,max,color){
  var pct=max>0?Math.round((val/max)*100):0;
  return '<div class="bar-wrap"><div class="bar-label"><span style="font-weight:700">'+label+'</span>'+
    '<span style="color:'+color+';font-weight:800">'+val+'/'+max+' ('+pct+'%)</span></div>'+
    '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+color+','+color+'cc)"></div></div></div>';
}

function fmtDate(str){if(!str)return '';var d=new Date(str);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}

function getTotalPaid(sid){return(DB.fees.payments[sid]||[]).reduce(function(s,p){return s+(+p.amount||0);},0);}

function getYearlyFee(cls,subject){
  var cf=DB.fees.classFee||{};
  if(subject){var key=cls+' - '+subject;if(cf[key]!==undefined&&cf[key]>0)return cf[key];}
  if(cf[cls]!==undefined&&cf[cls]>0)return cf[cls];
  if(subject){var keys=Object.keys(cf);for(var i=0;i<keys.length;i++){if(keys[i].indexOf(cls)>=0&&keys[i].indexOf(subject)>=0&&cf[keys[i]]>0)return cf[keys[i]];}}
  return 0;
}

function toggleDark(){
  var b=document.body.classList.toggle('dark-mode');
  localStorage.setItem('pcDark',b?'1':'0');
  document.getElementById('theme-btn').textContent=b?'☀️':'🌙';
}
function applyDark(){
  if(localStorage.getItem('pcDark')==='1'){
    document.body.classList.add('dark-mode');
    setTimeout(function(){var b=document.getElementById('theme-btn');if(b)b.textContent='☀️';},100);
  }
}

// ── Load DB ──────────────────────────────────────────────────────
function loadDB(cb){
  var cbName='sCb'+Date.now(),script=document.createElement('script'),done=false;
  window[cbName]=function(d){
    done=true;delete window[cbName];
    try{document.head.removeChild(script);}catch(e){}
    if(d&&d.status==='ok'&&d.data){
      var ld=d.data;
      if(ld.students)DB.students=ld.students;
      if(ld.attendance)DB.attendance=ld.attendance;
      if(ld.marks)DB.marks=ld.marks;
      if(ld.fees)DB.fees=ld.fees;
      if(ld.notices&&ld.notices.length>0)DB.notices=ld.notices;
      if(ld.schedule)DB.schedule=ld.schedule;
      if(ld.starStudent!==undefined)DB.starStudent=ld.starStudent;
      if(ld.feedback)DB.feedback=ld.feedback;
      if(ld.materials)DB.materials=ld.materials;
        if(ld.homework)DB.homework=ld.homework||{};
    }
    loaded=true;if(cb)cb();
  };
  script.src=API_URL+'?action=load&callback='+cbName+'&t='+Date.now();
  script.onerror=function(){if(!done){delete window[cbName];loaded=true;if(cb)cb();}};
  setTimeout(function(){if(!done){delete window[cbName];try{document.head.removeChild(script);}catch(e){}loaded=true;if(cb)cb();}},15000);
  document.head.appendChild(script);
}

// ── Login ────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML=
    '<div class="login-wrap">'+
    '<div class="login-logo-wrap">'+logoBigSVG+
    '<div class="login-brand">Phoenix Classes</div>'+
    '<div class="login-sub">Student Portal · Maharashtra Board</div></div>'+
    '<div class="login-card">'+
    '<div class="login-title">Welcome Back! 👋</div>'+
    '<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:22px;font-weight:600">Login with your registered phone number</div>'+
    '<div class="mb"><label>📱 Phone Number</label>'+
    '<input type="tel" id="login-phone" placeholder="Enter 10-digit number" maxlength="10" style="font-size:16px;letter-spacing:2px"/></div>'+
    '<button class="btn btn-orange" onclick="doLogin()" style="font-size:15px;padding:14px">Login  →</button>'+
    '<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:14px;font-weight:600">Use the number registered with Phoenix Classes<br>📍 Bahe, Walwa, Dist-Sangli</div>'+
    '</div></div>';
  applyDark();
  setTimeout(function(){var i=document.getElementById('login-phone');if(i)i.focus();},300);
}

function doLogin(){
  var ph=document.getElementById('login-phone');
  if(!ph||ph.value.length<10){toast('Enter valid 10-digit number!',true);return;}
  var num=ph.value.trim();
  var found=null;
  for(var i=0;i<DB.students.length;i++){
    var s=DB.students[i],sph=String(s.phone||'').replace(/\D/g,'');
    if(sph===num||sph==='91'+num||num==='91'+sph){found=s;break;}
  }
  if(!found){toast('Number not found! Contact teacher.',true);return;}
  currentStudent=found;
  localStorage.setItem('pcStudentId',found.id);
  pg='home';renderApp();
}
function doLogout(){currentStudent=null;localStorage.removeItem('pcStudentId');renderLogin();}

// ── NAV ──────────────────────────────────────────────────────────
function makeNav(activePg){
  var navItems=[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'schedule',icon:'📅',label:'Schedule'},
    {id:'rankings',icon:'🏆',label:'Ranks'},
    {id:'idcard',icon:'📱',label:'ID Card'},
    {id:'more',icon:'☰',label:'More'}
  ];
  return '<div class="bottom-nav">'+navItems.map(function(n){
    return '<div class="bn-item '+(activePg===n.id?'active':'')+'" onclick="go(\''+n.id+'\')">'+
      '<div class="bn-icon">'+n.icon+'</div><span>'+n.label+'</span></div>';
  }).join('')+'</div>';
}

// ── Pages ────────────────────────────────────────────────────────
function pgHome(){
  var s=currentStudent;
  var attD=0,attP=0;
  for(var k in DB.attendance){if(k.indexOf('_'+s.cls)>=0){var r=DB.attendance[k];if(r[s.id]){attD++;if(r[s.id]==='P')attP++;}}}
  var attPct=attD>0?Math.round((attP/attD)*100):0;
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both');});
  var md=DB.marks.data||{},totM=0,obtM=0;
  tests.forEach(function(t){var v=Number((md[t.id]||{})[s.id]||0);if(v){totM+=t.maxMarks;obtM+=v;}});
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  var paid=getTotalPaid(s.id),fee=getYearlyFee(s.cls,s.subject),bal=fee-paid;
  var ovG=avgPct>=75?'A':avgPct>=60?'B':avgPct>=40?'C':tests.length>0?'D':'—';
  var gc=ovG==='A'?'#10b981':ovG==='B'?'#6366f1':ovG==='C'?'#f59e0b':'#ef4444';

  var badges=[];
  if(fee>0&&paid>=fee)badges.push({icon:'💰',label:'Fee Clear',color:'#10b981'});
  if(attPct===100&&attD>0)badges.push({icon:'📅',label:'Perfect Attendance',color:'#6366f1'});
  if(attPct>=90&&attD>0)badges.push({icon:'🌟',label:'Star Attendance',color:'#8b5cf6'});
  if(avgPct>=75)badges.push({icon:'🥇',label:'Top Scorer',color:'#f59e0b'});
  if(DB.starStudent&&String(DB.starStudent.id)===String(s.id))badges.push({icon:'⭐',label:'Star Student',color:'#f59e0b'});

  var badgesHtml=badges.length?'<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:12px">'+
    badges.map(function(b){return '<span style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800">'+b.icon+' '+b.label+'</span>';}).join('')+'</div>':'';

  var attWarning='';
  if(attPct<75&&attD>0){
    attWarning='<div class="att-warning anim"><div style="font-size:28px">⚠️</div>'+
      '<div><div style="font-weight:800;color:var(--red);font-size:13px">Attendance Below 75%</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">Your attendance is <b>'+attPct+'%</b>. Please attend classes regularly.</div></div></div>';
  }

  // Mini chart
  var chartBars=tests.slice(-5).map(function(t){
    var v=Number((md[t.id]||{})[s.id]||0);
    var pct=v?Math.round((v/t.maxMarks)*100):0;
    var col=pct>=75?'#10b981':pct>=60?'#6366f1':pct>=40?'#f59e0b':'#ef4444';
    return '<div class="chart-bar-col">'+
      '<div class="chart-bar-pct">'+pct+'%</div>'+
      '<div class="chart-bar-bg"><div class="chart-bar-fill" style="height:'+Math.max(pct,4)+'%;background:linear-gradient(180deg,'+col+','+col+'99)"></div></div>'+
      '<div class="chart-bar-name">'+esc(t.testName.split(' ')[0])+'</div></div>';
  }).join('');
  var chartHtml=tests.length?'<div class="card anim anim-d3"><div class="card-title">📊 Performance Graph</div>'+
    '<div class="chart-bar-wrap">'+chartBars+'</div></div>':'';

  var starBanner='';
  if(DB.starStudent&&String(DB.starStudent.id)===String(s.id)){
    starBanner='<div class="star-banner anim">'+
      '<div style="font-size:42px">⭐</div>'+
      '<div><div style="font-size:17px;font-weight:800;color:#fff;font-family:var(--font-head)">Star Student!</div>'+
      '<div style="font-size:12px;color:#fef3c7;margin-top:2px">'+esc((DB.starStudent&&DB.starStudent.reason)||'Outstanding performance!')+'</div></div></div>';
  }

  var today=new Date().toISOString().slice(0,10);
  var upcoming=(DB.schedule||[]).filter(function(sc){return sc.cls===s.cls&&sc.date>=today;}).slice(0,3);
  var scheduleHtml=upcoming.length===0?'':
    '<div class="card anim anim-d4"><div class="card-title">📅 Upcoming Tests</div>'+
    upcoming.map(function(sc){
      var daysLeft=Math.ceil((new Date(sc.date)-new Date())/(1000*60*60*24));
      var urgBg=daysLeft<=2?'linear-gradient(135deg,#ef4444,#dc2626)':daysLeft<=7?'linear-gradient(135deg,#f59e0b,#d97706)':'linear-gradient(135deg,#10b981,#059669)';
      return '<div class="schedule-item">'+
        '<div style="flex:1"><div style="font-weight:800;font-size:13px;font-family:var(--font-head)">'+esc(sc.title)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:3px;font-weight:600">'+sc.subject+' · '+fmtDate(sc.date)+'</div></div>'+
        '<div class="days-badge" style="background:'+urgBg+'">'+
        '<div style="font-size:18px;font-weight:900;color:#fff;font-family:var(--font-head)">'+daysLeft+'</div>'+
        '<div style="font-size:9px;color:rgba(255,255,255,0.8);font-weight:800">days</div></div></div>';
    }).join('')+'</div>';

  // Hero card
  var heroHtml='<div class="hero-card anim">'+
    '<div style="display:flex;gap:12px;align-items:center;position:relative;z-index:1">'+logoSVG+
    '<div class="hero-avatar">'+esc(s.name[0])+'</div>'+
    '<div><div style="font-family:var(--font-head);font-size:18px;font-weight:800;color:#fff">'+esc(s.name)+'</div>'+
    '<div style="font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;font-weight:600">'+s.cls+' · '+s.subject+' · Phoenix Classes</div></div></div>'+
    badgesHtml+'</div>';

  // Stat row
  var attBg=attPct<75?'linear-gradient(135deg,#ef4444,#dc2626)':'linear-gradient(135deg,#10b981,#059669)';
  var grBg=ovG==='A'?'linear-gradient(135deg,#10b981,#059669)':ovG==='B'?'linear-gradient(135deg,#6366f1,#4f46e5)':ovG==='C'?'linear-gradient(135deg,#f59e0b,#d97706)':'linear-gradient(135deg,#ef4444,#dc2626)';
  var feeBg=bal<=0?'linear-gradient(135deg,#10b981,#059669)':'linear-gradient(135deg,#ef4444,#dc2626)';
  var statRow='<div class="grid3 anim anim-d1">'+
    sc(attPct+'%','Attendance',attBg)+
    sc(ovG,'Grade',grBg)+
    sc(bal<=0?'✓':'₹'+bal,bal<=0?'Fee OK':'Due',feeBg)+'</div>';

  var overviewCard='<div class="card anim anim-d2"><div class="card-title">📈 Overview</div>'+
    bar('Attendance',attP,attD||1,attPct<75?'#ef4444':'#10b981')+
    bar('Academic Score',obtM,totM||1,gc)+'</div>';

  // ── Rank in class ──────────────────────────────
  var classStudents=DB.students.filter(function(st){return st.cls===s.cls;});
  var rankData=classStudents.map(function(st){
    var stTests=(DB.marks.tests||[]).filter(function(t){return t.cls===st.cls&&(t.subject===st.subject||st.subject==='Both');});
    var stObt=0,stTot=0;
    stTests.forEach(function(t){var v=Number((DB.marks.data[t.id]||{})[st.id]||0);if(v){stObt+=v;stTot+=t.maxMarks;}});
    return {id:st.id,pct:stTot>0?Math.round((stObt/stTot)*100):0};
  }).sort(function(a,b){return b.pct-a.pct;});
  var myRank=1;for(var ri=0;ri<rankData.length;ri++){if(rankData[ri].id===s.id){myRank=ri+1;break;}}
  var rankCard=classStudents.length>1&&totM>0?
    '<div class="card anim anim-d3" style="text-align:center;padding:16px">'+
      '<div style="font-size:28px font-weight:900;background:linear-gradient(135deg,#f97316,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🏆 वर्गातील क्रमांक</div>'+
      '<div style="font-size:48px;font-weight:900;color:#f97316;line-height:1.1">'+myRank+'<span style="font-size:20px">वा</span></div>'+
      '<div style="color:var(--muted);font-size:13px">'+classStudents.length+' विद्यार्थ्यांपैकी</div>'+
    '</div>':''

  // ── Homework status today ───────────────────
  var today2=new Date().toISOString().slice(0,10);
  // Search all homework keys for today + student's class (flexible match)
  var hwSt2='';
  if(DB.homework){
    var allHWKeys=Object.keys(DB.homework);
    // Debug: log all keys
    console.log('HW keys:', allHWKeys, 'today:', today2, 'cls:', s.cls, 'id:', s.id);
    for(var hi=0;hi<allHWKeys.length;hi++){
      var hk=allHWKeys[hi];
      // Key format: 2026-05-05_Class 10 Semi-English
      // Also try with full class name variations
      var clsMatch = hk.indexOf(s.cls)>=0 ||
                     hk.toLowerCase().indexOf(s.cls.toLowerCase())>=0;
      if(hk.indexOf(today2)===0 && clsMatch){
        var hwRec=DB.homework[hk];
        console.log('Found HW key:', hk, 'rec:', hwRec);
        // Try all ID formats
        var idStr=String(s.id), idNum=Number(s.id);
        if(hwRec[s.id]){hwSt2=hwRec[s.id];break;}
        if(hwRec[idStr]){hwSt2=hwRec[idStr];break;}
        if(hwRec[idNum]){hwSt2=hwRec[idNum];break;}
      }
    }
    console.log('HW status:', hwSt2);
  } else {
    console.log('DB.homework is empty/undefined');
  }
  var hwCard='<div class="card anim anim-d3" style="display:flex;align-items:center;gap:12px">'+
    '<div style="font-size:32px">📝</div>'+
    '<div><div style="font-weight:800;font-size:15px">आजचा गृहपाठ</div>'+
    '<div style="font-size:13px;color:'+(hwSt2==='Y'?'#10b981':hwSt2==='N'?'#ef4444':'var(--muted)')+'">'+(hwSt2==='Y'?'✅ पूर्ण केला':hwSt2==='N'?'❌ पूर्ण केला नाही':'— नोंद नाही')+'</div></div>'+
  '</div>';

  var mnths=['जाने','फेब्रु','मार्च','एप्रिल','मे','जून','जुलै','ऑगस्ट','सप्टें','ऑक्टो','नोव्हे','डिसें'];

function buildAttCal(attMap,year,month){
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var today=new Date();
  var cells='';
  // Empty cells before first day
  for(var i=0;i<firstDay;i++){
    cells+='<div></div>';
  }
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=year+'-'+(month+1<10?'0':'')+(month+1)+'-'+(d<10?'0':'')+d;
    var st=attMap[dateStr]||'';
    var isToday=(today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d);
    var bg=st==='P'?'#10b981':st==='A'?'#ef4444':'transparent';
    var border=isToday?'2px solid #f97316':'1px solid var(--border,#333)';
    var textCol=st?'#fff':'var(--text,#fff)';
    cells+='<div style="text-align:center;padding:6px 2px;border-radius:50%;background:'+bg+';border:'+border+';color:'+textCol+';font-size:13px;font-weight:'+(isToday?800:500)+';aspect-ratio:1;display:flex;align-items:center;justify-content:center">'+d+'</div>';
  }
  return '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">'+cells+'</div>';
}

    sc('₹'+paid,'भरले','linear-gradient(135deg,#10b981,#059669)')+
    sc(bal<=0?'₹0':'₹'+bal,bal<=0?'Cleared':'Balance',bal<=0?'linear-gradient(135deg,#10b981,#059669)':'linear-gradient(135deg,#ef4444,#dc2626)')+'</div>'+
    (bal>0?'<button class="upi-btn" onclick="window.open(\''+upiUrl+'\',\'_blank\')">📱 Pay ₹'+bal+' via UPI (PhonePe / GPay)</button>':
    '<div style="background:var(--greenLight);border:1px solid var(--green);border-radius:var(--radius-sm);padding:14px;text-align:center;margin-bottom:12px;font-weight:800;color:var(--green);font-size:15px">✅ All Fees Cleared!</div>')+
    '<div class="card anim anim-d1"><div class="card-title">💳 Payment History</div>'+
    (pays.length===0?'<div class="empty">No payments recorded yet.</div>':
    pays.slice().reverse().map(function(p){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div><div style="font-weight:800;font-size:15px;color:var(--green)">₹'+p.amount+'</div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:2px;font-weight:600">'+fmtDate(p.date)+(p.note?' · '+esc(p.note):'')+'</div></div>'+
        bdg('भरले','#10b981')+'</div>';
    }).join(''))+'</div>';
}

function pgNotices(){
  var s=currentStudent;
  var notices=(DB.notices||[]).filter(function(n){return n.cls==='All'||n.cls===s.cls;});
  if(notices.length===0)return '<div class="card anim"><div class="empty" style="padding:40px">📢<br><br>No notices yet.<br>Check back later!</div></div>';
  return '<div class="card anim"><div class="card-title">📢 Notices ('+notices.length+')</div>'+
    notices.slice().reverse().map(function(n){
      return '<div class="notice-item">'+
        '<div style="font-weight:800;font-size:13px;font-family:var(--font-head)">'+esc(n.title)+'</div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:700">📅 '+fmtDate(n.date)+' · '+(n.cls==='All'?'All Students':n.cls)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:7px;line-height:1.6;font-weight:600">'+esc(n.message)+'</div></div>';
    }).join('')+'</div>';
}

function pgMaterials(){
  var s=currentStudent;
  var mats=(DB.materials||[]).filter(function(m){return m.cls==='All'||m.cls===s.cls;});
  var typeIcon={'PDF':'📄','Video':'🎥','Image':'🖼️','Link':'🔗'};
  var typeColor={'PDF':'#ef4444','Video':'#8b5cf6','Image':'#10b981','Link':'#6366f1'};
  if(mats.length===0){
    return '<div class="card anim"><div class="empty" style="padding:40px">📝<br><br>No study materials yet.<br>Check back later!</div></div>';
  }
  var grouped={};
  mats.forEach(function(m){var key=m.subject||'General';if(!grouped[key])grouped[key]=[];grouped[key].push(m);});
  var html='';
  Object.keys(grouped).forEach(function(sub){
    html+='<div class="card anim"><div class="card-title">📚 '+esc(sub)+'</div>'+
      grouped[sub].map(function(m){
        var icon=typeIcon[m.type]||'🔗';
        var color=typeColor[m.type]||'#6366f1';
        return '<div class="material-item">'+
          '<div class="mat-icon" style="background:'+color+'18">'+icon+'</div>'+
          '<div style="flex:1"><div style="font-weight:800;font-size:13px;font-family:var(--font-head)">'+esc(m.title)+'</div>'+
          '<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">'+m.type+(m.desc?' · '+esc(m.desc):'')+'</div></div>'+
          '<a href="'+esc(m.link)+'" target="_blank" style="background:'+color+';color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;text-decoration:none;flex-shrink:0;font-family:var(--font)">Open ↗</a>'+
          '</div>';
      }).join('')+'</div>';
  });
  return html;
}

function pgReport(){
  var s=currentStudent;
  var attD=0,attP=0;
  for(var k in DB.attendance){if(k.indexOf('_'+s.cls)>=0){var r=DB.attendance[k];if(r[s.id]){attD++;if(r[s.id]==='P')attP++;}}}
  var attPct=attD>0?Math.round((attP/attD)*100):0;
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both');});
  var md=DB.marks.data||{},totM=0,obtM=0;
  var testRows=tests.map(function(t){
    var v=Number((md[t.id]||{})[s.id]||0);
    var pct=v?Math.round((v/t.maxMarks)*100):0;
    var g=!v?'—':pct>=75?'A':pct>=60?'B':pct>=40?'C':'D';
    if(v){totM+=t.maxMarks;obtM+=v;}
    return '<tr><td style="font-weight:700">'+esc(t.testName)+'</td><td>'+t.subject+'</td>'+
      '<td style="text-align:center;font-weight:800">'+v+'/'+t.maxMarks+'</td>'+
      '<td style="text-align:center;font-weight:900;color:'+(g==='A'?'#10b981':g==='B'?'#6366f1':g==='C'?'#f59e0b':'#ef4444')+'">'+g+'</td></tr>';
  }).join('');
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  var ovG=avgPct>=75?'A':avgPct>=60?'B':avgPct>=40?'C':tests.length>0?'D':'—';
  var remark=DB.remarks&&DB.remarks[s.id]?DB.remarks[s.id]:'Keep working hard and stay consistent!';
  var today=new Date();
  var dateStr=today.getDate()+'/'+(today.getMonth()+1)+'/'+today.getFullYear();
  return '<div id="report-content">'+
    '<div style="background:linear-gradient(135deg,#f97316,#ea580c);padding:20px;border-radius:var(--radius);color:#fff;margin-bottom:12px;box-shadow:0 8px 32px rgba(249,115,22,0.35)">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-family:var(--font-head);font-size:20px;font-weight:800">🔥 Phoenix Classes</div>'+
    '<div style="font-size:11px;color:#fed7aa;font-weight:600">Progress Report · Maharashtra Board</div></div>'+
    '<div style="font-size:11px;color:#fed7aa;text-align:right;font-weight:600">Date: '+dateStr+'</div></div></div>'+
    '<div class="card">'+
    '<div style="display:flex;gap:12px;align-items:center">'+
    '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;font-family:var(--font-head)">'+esc(s.name[0])+'</div>'+
    '<div><div style="font-family:var(--font-head);font-size:16px;font-weight:800">'+esc(s.name)+'</div>'+
    '<div style="font-size:12px;color:var(--muted);font-weight:600">'+s.cls+' · '+s.subject+' · ID: PC'+s.id.toString().slice(-6)+'</div></div>'+
    '<div style="margin-left:auto;text-align:center;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:12px;padding:10px 16px">'+
    '<div style="font-family:var(--font-head);font-size:28px;font-weight:800;color:#fff">'+ovG+'</div>'+
    '<div style="font-size:9px;color:#fed7aa;font-weight:800">GRADE</div></div></div></div>'+
    '<div class="grid3">'+
    sc(attPct+'%','Attendance','linear-gradient(135deg,#10b981,#059669)')+
    sc(avgPct+'%','Avg Score','linear-gradient(135deg,#6366f1,#4f46e5)')+
    sc(obtM+'/'+totM,'Total Marks','linear-gradient(135deg,#8b5cf6,#7c3aed)')+'</div>'+
    '<div class="card"><div class="card-title">📈 Attendance</div>'+bar('Present',attP,attD||1,'#10b981')+'</div>'+
    '<div class="card"><div class="card-title">📝 Test Results</div>'+
    (tests.length===0?'<div class="empty">No tests recorded yet.</div>':
    '<table><thead><tr><th>Test</th><th>Subject</th><th style="text-align:center">Marks</th><th style="text-align:center">Grade</th></tr></thead><tbody>'+testRows+'</tbody></table>')+'</div>'+
    '<div class="card"><div class="card-title">💬 Teacher\'s Remark</div>'+
    '<div style="font-size:13px;color:var(--text);line-height:1.7;font-style:italic;font-weight:600">"'+esc(remark)+'"</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:8px;font-weight:700">— Phoenix Classes Teacher</div></div>'+
    '</div>'+
    '<button class="btn btn-orange no-print" onclick="window.print()" style="margin-top:4px">🖨️ Print / Save as PDF</button>';
}

function pgFeedback(){
  var sent=localStorage.getItem('pcFbSent');
  if(sent){
    return '<div class="card anim"><div class="feedback-sent">'+
      '<div style="font-size:48px;margin-bottom:12px">🙏</div>'+
      '<div style="font-family:var(--font-head);font-weight:800;font-size:17px;margin-bottom:6px">Thank you!</div>'+
      '<div style="font-size:12px;color:var(--muted);font-weight:600">Your feedback has been sent to the teacher.</div>'+
      '<button class="btn btn-gray no-print" style="margin-top:16px;width:auto;padding:10px 24px;font-size:13px" onclick="localStorage.removeItem(\'pcFbSent\');render()">Send Again</button></div></div>';
  }
  return '<div class="card anim"><div class="card-title">💬 Share Your Feedback</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:16px;font-weight:600">Share your thoughts, suggestions or issues with your teacher.</div>'+
    '<div class="mb"><label>Rating ⭐</label>'+
    '<div style="display:flex;gap:8px;margin-top:6px">'+
    [1,2,3,4,5].map(function(r){
      return '<label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1">'+
        '<input type="radio" name="rating" value="'+r+'" style="width:auto" '+(r===5?'checked':'')+'/>'+
        '<span style="font-size:26px">⭐</span>'+
        '<span style="font-size:10px;color:var(--muted);font-weight:700">'+r+'</span></label>';
    }).join('')+
    '</div></div>'+
    '<div class="mb"><label>Your Message</label>'+
    '<textarea id="fb-msg" rows="4" placeholder="Write your feedback here..."></textarea></div>'+
    '<button class="btn btn-orange" onclick="submitFeedback()">Send Feedback 📨</button></div>';
}

function submitFeedback(){
  var msg=document.getElementById('fb-msg');
  if(!msg||!msg.value.trim()){toast('Please write your feedback!',true);return;}
  localStorage.setItem('pcFbSent','1');
  toast('Feedback sent! Thank you 😊',false);
  render();
}

function render(){renderApp();}

function go(p){
  pg=p;
  var extraPages=['attendance','marks','fees','notices','report','feedback','materials'];
  var mainPages=['home','schedule','rankings','idcard','more'];

  var content='',title='',activeNav=p;
  if(p==='attendance'){content=pgAttendance();title='📋 My Attendance';activeNav='more';}
  else if(p==='marks'){content=pgMarks();title='📊 My Results';activeNav='more';}
  else if(p==='fees'){content=pgFees();title='💰 Fee Status';activeNav='more';}
  else if(p==='notices'){content=pgNotices();title='📢 Notices';activeNav='more';}
  else if(p==='report'){content=pgReport();title='📈 Progress Report';activeNav='more';}
  else if(p==='feedback'){content=pgFeedback();title='💬 Feedback';activeNav='more';}
  else if(p==='materials'){content=pgMaterials();title='📝 Study Materials';activeNav='more';}
  else if(p==='home'){content=pgHome();title='';}
  else if(p==='schedule'){content=pgSchedule();title='📅 Test Schedule';}
  else if(p==='rankings'){content=pgRankings();title='🏆 Class Rankings';}
  else if(p==='idcard'){content=pgIDCard();title='📱 Student ID Card';}
  else if(p==='more'){content=pgMore();title='Menu';}

  var isExtra=extraPages.indexOf(p)>=0;
  var header='';
  if(p==='home'){
    header='';
  } else if(isExtra){
    header='<div class="page-header">'+
      '<button onclick="go(\'more\')" class="top-btn no-print" style="font-size:12px;padding:6px 12px">← Back</button>'+
      '<div class="page-title">'+title+'</div>'+
      '<button onclick="refreshData()" class="top-btn no-print">🔄</button></div>';
  } else {
    header='<div class="page-header">'+
      '<div class="page-title">'+title+'</div>'+
      '<button onclick="refreshData()" class="top-btn no-print">🔄</button></div>';
  }

  document.getElementById('root').innerHTML=
    '<div class="main">'+header+content+'</div>'+
    makeNav(activeNav)+
    '<div class="top-btns no-print">'+
    '<button class="top-btn" id="theme-btn" onclick="toggleDark()">🌙</button>'+
    (p==='home'?'<button class="top-btn" onclick="doLogout()" style="font-size:11px">Logout</button>':'')+'</div>';
  applyDark();
  window.scrollTo(0,0);
}

function renderApp(){go(pg);}

function refreshData(){
  toast('🔄 Refreshing...',false);
  loadDB(function(){
    if(currentStudent){
      for(var i=0;i<DB.students.length;i++){
        if(String(DB.students[i].id)===String(currentStudent.id)){currentStudent=DB.students[i];break;}
      }
    }
    renderApp();toast('✅ Updated!',false);
  });
}

function init(){
  document.getElementById('root').innerHTML=
    '<div class="loading-screen">'+logoBigSVG+
    '<div style="font-family:var(--font-head);font-weight:800;font-size:18px;color:var(--accent);margin-top:4px">Phoenix Classes</div>'+
    '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'+
    '</div>';
  applyDark();
  loadDB(function(){
    var savedId=localStorage.getItem('pcStudentId');
    if(savedId){for(var i=0;i<DB.students.length;i++){if(String(DB.students[i].id)===String(savedId)){currentStudent=DB.students[i];break;}}}
    if(currentStudent){renderApp();}else{renderLogin();}
  });
}
window.onload=function(){init();};
</script>
</body>
</html>
