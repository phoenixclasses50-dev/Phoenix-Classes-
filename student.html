<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#f97316"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Phoenix Classes"/>
<title>Phoenix Classes — Student Portal</title>
<style>
:root{--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--accent:#f97316;--accent2:#ea580c;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:Arial,sans-serif;color:var(--text);font-size:14px;min-height:100vh;transition:background .2s,color .2s;}
.dark-mode{--bg:#0a0d14;--card:#111827;--border:#1f2937;--text:#f1f5f9;--muted:#6b7280;}
.main{padding:20px 16px 80px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;height:60px;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:9px;gap:2px;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.stat-num{font-size:22px;font-weight:800;line-height:1;}
.stat-label{font-size:9px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase;}
label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;}
input,select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;box-sizing:border-box;font-family:Arial,sans-serif;}
input:focus{border-color:var(--accent);}
.btn{color:#fff;border:none;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:Arial,sans-serif;}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn-gray{background:var(--border);color:var(--muted);}
.badge{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;display:inline-block;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 7px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:9px 7px;border-bottom:1px solid var(--border);vertical-align:middle;}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:12px;}
.bar-wrap{margin-bottom:8px;}
.bar-label{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-bg{background:var(--border);border-radius:20px;height:9px;overflow:hidden;}
.bar-fill{height:9px;border-radius:20px;}
.mb{margin-bottom:10px;}
.notice-item{padding:12px;border-radius:10px;background:#1e2333;border-left:3px solid var(--accent);margin-bottom:8px;}
.notice-title{font-weight:800;font-size:13px;margin-bottom:4px;}
.notice-date{font-size:10px;color:var(--muted);}
.notice-msg{font-size:12px;color:#94a3b8;margin-top:6px;line-height:1.5;}
/* Login screen */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo{font-size:56px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:4px;text-align:center;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px;text-align:center;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;}
/* Header */
.app-header{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden;}
.app-header::before{content:'📚';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:44px;opacity:.2;}
.app-header-name{font-size:18px;font-weight:800;color:#fff;}
.app-header-sub{font-size:11px;color:#fed7aa;margin-top:2px;}
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;display:none;white-space:nowrap;}
.toast.err{background:var(--red);}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbw_n1ucp7EZWpEZTgG50qcp7s_BucHGiDMigwGKbPO2Tzut3mQAPlkAc8YN0WIUxzpD/exec';

// ── State ─────────────────────────────────────────────────────────
var DB={students:[],attendance:{},marks:{tests:[],data:{}},fees:{classFee:{},payments:{}},notices:[]};
var currentStudent=null;
var pg='home';
var loaded=false;

function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}

// ── Load from Sheets ───────────────────────────────────────────────
function loadDB(cb){
  var cbName='sCb'+Date.now();
  var script=document.createElement('script');
  var done=false;
  window[cbName]=function(d){
    done=true;delete window[cbName];
    try{document.head.removeChild(script);}catch(e){}
    if(d&&d.status==='ok'&&d.data){
      var ld=d.data;
      if(ld.students)DB.students=ld.students;
      if(ld.attendance)DB.attendance=ld.attendance;
      if(ld.marks)DB.marks=ld.marks;
      if(ld.fees)DB.fees=ld.fees;
      if(ld.notices)DB.notices=ld.notices;
    }
    loaded=true;
    if(cb)cb();
  };
  script.src=API_URL+'?action=load&callback='+cbName+'&t='+Date.now();
  script.onerror=function(){
    if(!done){delete window[cbName];loaded=true;if(cb)cb();}
  };
  setTimeout(function(){
    if(!done){delete window[cbName];try{document.head.removeChild(script);}catch(e){}loaded=true;if(cb)cb();}
  },15000);
  document.head.appendChild(script);
}

// ── Login ──────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML=
    '<div class="login-wrap">'+
    '<div class="login-logo">🔥</div>'+
    '<div class="login-title">Phoenix Classes</div>'+
    '<div class="login-sub">Student Portal · Maharashtra Board</div>'+
    '<div class="login-card">'+
    '<div style="font-weight:800;font-size:15px;margin-bottom:4px;text-align:center">Welcome! 👋</div>'+
    '<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px">Login with your registered phone number</div>'+
    '<div class="mb"><label>Your Phone Number</label><input type="tel" id="login-phone" style="background:var(--bg);border-color:var(--border);color:var(--text)" placeholder="Enter 10-digit number" maxlength="10"/></div>'+
    '<button class="btn btn-orange" onclick="doLogin()">Login →</button>'+
    '<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:14px">Use the phone number registered with Phoenix Classes</div>'+
    '</div></div>';
}

function doLogin(){
  var ph=document.getElementById('login-phone');
  if(!ph||ph.value.length<10){toast('Enter valid 10-digit number!',true);return;}
  var num=ph.value.trim();
  // Find student by phone
  var found=null;
  for(var i=0;i<DB.students.length;i++){
    var s=DB.students[i];
    var sph=String(s.phone||'').replace(/\D/g,'');
    if(sph===num||sph==='91'+num||num==='91'+sph){found=s;break;}
  }
  if(!found){toast('Phone number not found! Contact teacher.',true);return;}
  currentStudent=found;
  localStorage.setItem('pcStudentId',found.id);
  pg='home';
  renderApp();
}

function doLogout(){
  currentStudent=null;
  localStorage.removeItem('pcStudentId');
  renderLogin();
}

// ── Helpers ────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bdg(t,c){return '<span class="badge" style="background:'+c+'22;color:'+c+'">'+t+'</span>';}
function sc(n,l,c){return '<div class="stat-card" style="border-top:3px solid '+c+'"><div class="stat-num" style="color:'+c+'">'+n+'</div><div class="stat-label">'+l+'</div></div>';}
function bar(label,val,max,color){
  var pct=max>0?Math.round((val/max)*100):0;
  return '<div class="bar-wrap"><div class="bar-label"><span>'+label+'</span><span style="color:'+color+';font-weight:700">'+val+'/'+max+' ('+pct+'%)</span></div>'+
    '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
}
function fmtDate(str){if(!str)return '';var d=new Date(str);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function getTotalPaid(sid){return (DB.fees.payments[sid]||[]).reduce(function(s,p){return s+(+p.amount||0);},0);}
function getYearlyFee(cls){return (DB.fees.classFee||{})[cls]||0;}

// ── Pages ──────────────────────────────────────────────────────────
function pgHome(){
  var s=currentStudent;
  var attDays=0,attPresent=0;
  for(var k in DB.attendance){
    if(k.indexOf('_'+s.cls)>=0){
      var rec=DB.attendance[k];
      if(rec[s.id]){attDays++;if(rec[s.id]==='P')attPresent++;}
    }
  }
  var attPct=attDays>0?Math.round((attPresent/attDays)*100):0;
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both');});
  var md=DB.marks.data||{};
  var totM=0,obtM=0;
  tests.forEach(function(t){var v=Number((md[t.id]||{})[s.id]||0);if(v){totM+=t.maxMarks;obtM+=v;}});
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  var paid=getTotalPaid(s.id),fee=getYearlyFee(s.cls),bal=fee-paid;
  var ovG=avgPct>=75?'A':avgPct>=60?'B':avgPct>=40?'C':tests.length>0?'D':'—';
  var gc=ovG==='A'?'#22c55e':ovG==='B'?'#3b82f6':ovG==='C'?'#eab308':'#ef4444';
  return '<div class="app-header">'+
    '<div class="app-header-name">Hello, '+esc(s.name.split(' ')[0])+'! 👋</div>'+
    '<div class="app-header-sub">'+s.cls+' · '+s.subject+' · Phoenix Classes</div></div>'+
    '<div class="grid3">'+
    sc(attPct+'%','Attendance','#22c55e')+
    sc(ovG,'Overall Grade',gc)+
    sc(bal<=0?'Paid':'₹'+bal,bal<=0?'Fee Clear':'Due','#eab308')+
    '</div>'+
    '<div class="card"><div class="card-title">📈 Attendance</div>'+bar('Present',attPresent,attDays||1,'#22c55e')+'</div>'+
    '<div class="card"><div class="card-title">📊 Academic Performance</div>'+bar('Score',obtM,totM||1,gc)+'</div>'+
    '<div class="card"><div class="card-title">💰 Fee Status</div>'+
    '<div class="grid3" style="margin-bottom:0">'+
    sc('₹'+fee,'Total Fee','#3b82f6')+sc('₹'+paid,'Paid','#22c55e')+sc(bal<=0?'₹0':'₹'+bal,bal<=0?'Cleared':'Balance',bal<=0?'#22c55e':'#ef4444')+
    '</div></div>';
}

function pgAttendance(){
  var s=currentStudent;
  var records=[];
  for(var k in DB.attendance){
    if(k.indexOf('_'+s.cls)>=0){
      var rec=DB.attendance[k];
      if(rec[s.id]){
        var date=k.replace('_'+s.cls,'');
        records.push({date:date,status:rec[s.id]});
      }
    }
  }
  records.sort(function(a,b){return b.date.localeCompare(a.date);});
  var present=records.filter(function(r){return r.status==='P';}).length;
  var absent=records.filter(function(r){return r.status==='A';}).length;
  var pct=records.length>0?Math.round((present/records.length)*100):0;
  var rows=records.length===0?'<tr><td colspan="3" class="empty">No attendance records yet.</td></tr>':
    records.map(function(r){
      return '<tr><td>'+fmtDate(r.date)+'</td>'+
        '<td>'+(r.status==='P'?bdg('Present','#22c55e'):bdg('Absent','#ef4444'))+'</td></tr>';
    }).join('');
  return '<div class="grid3">'+sc(present,'Present','#22c55e')+sc(absent,'Absent','#ef4444')+sc(pct+'%','Percentage','#3b82f6')+'</div>'+
    '<div class="card"><div class="card-title">📈 Attendance Progress</div>'+bar('Present',present,records.length||1,'#22c55e')+'</div>'+
    '<div class="card"><div class="card-title">📋 Attendance Records</div>'+
    '<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function pgMarks(){
  var s=currentStudent;
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both'||t.subject===s.subject);});
  var md=DB.marks.data||{};
  var totM=0,obtM=0;
  var rows=tests.length===0?'<tr><td colspan="5" class="empty">No test results yet.</td></tr>':
    tests.map(function(t){
      var val=Number((md[t.id]||{})[s.id]||0);
      var pct=val?Math.round((val/t.maxMarks)*100):0;
      var g=!val?'—':pct>=75?'A':pct>=60?'B':pct>=40?'C':'D';
      var gc=g==='A'?'#22c55e':g==='B'?'#3b82f6':g==='C'?'#eab308':g==='D'?'#ef4444':'var(--muted)';
      if(val){totM+=t.maxMarks;obtM+=val;}
      return '<tr><td style="font-weight:700">'+esc(t.testName)+'</td><td>'+t.subject+'</td>'+
        '<td>'+val+'/'+t.maxMarks+'</td><td>'+pct+'%</td><td>'+bdg(g,gc)+'</td></tr>';
    }).join('');
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  var ovG=avgPct>=75?'A':avgPct>=60?'B':avgPct>=40?'C':tests.length>0?'D':'—';
  var gc2=ovG==='A'?'#22c55e':ovG==='B'?'#3b82f6':ovG==='C'?'#eab308':'#ef4444';
  return '<div class="grid2">'+sc(avgPct+'%','Average Score',gc2)+sc(ovG,'Overall Grade',gc2)+'</div>'+
    '<div class="card"><div class="card-title">📈 Overall Performance</div>'+bar('Score',obtM,totM||1,gc2)+'</div>'+
    '<div class="card"><div class="card-title">📝 All Test Results</div>'+
    '<table><thead><tr><th>Test</th><th>Sub</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
}

function pgFees(){
  var s=currentStudent;
  var pays=DB.fees.payments[s.id]||[];
  var totalPaid=getTotalPaid(s.id);
  var yearlyFee=getYearlyFee(s.cls);
  var balance=yearlyFee-totalPaid;
  var payRows=pays.length===0?'<div class="empty">No payments recorded yet.</div>':
    pays.slice().reverse().map(function(p){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div><div style="font-weight:700;color:#22c55e;font-size:15px">₹'+p.amount+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">'+fmtDate(p.date)+(p.note?' · '+esc(p.note):'')+'</div></div>'+
        bdg('Paid','#22c55e')+'</div>';
    }).join('');
  return '<div class="grid3">'+sc('₹'+yearlyFee,'Total Fee','#3b82f6')+sc('₹'+totalPaid,'Paid','#22c55e')+sc(balance<=0?'₹0':'₹'+balance,balance<=0?'Cleared':'Balance',balance<=0?'#22c55e':'#ef4444')+'</div>'+
    '<div class="card"><div class="card-title">📈 Payment Progress</div>'+bar('Fee Paid',totalPaid,yearlyFee||1,'#22c55e')+'</div>'+
    '<div class="card"><div class="card-title">💳 Payment History</div>'+payRows+'</div>';
}

function pgNotices(){
  var s=currentStudent;
  var notices=(DB.notices||[]).filter(function(n){
    return n.cls==='All'||n.cls===s.cls;
  });
  if(notices.length===0){
    return '<div class="card"><div class="empty" style="padding:40px">📢<br><br>No notices yet.<br>Check back later!</div></div>';
  }
  var items=notices.slice().reverse().map(function(n){
    return '<div style="background:#1e2333;border-left:3px solid var(--accent);border-radius:10px;padding:12px;margin-bottom:8px">'+
      '<div style="font-weight:800;font-size:13px">'+esc(n.title)+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-top:2px">📅 '+fmtDate(n.date)+' · '+(n.cls==='All'?'All Students':n.cls)+'</div>'+
      '<div style="font-size:12px;color:#94a3b8;margin-top:6px;line-height:1.5">'+esc(n.message)+'</div></div>';
  }).join('');
  return '<div class="card"><div class="card-title">📢 Notices & Announcements ('+notices.length+')</div>'+items+'</div>';
}

// ── Render App ────────────────────────────────────────────────────
function renderApp(){
  var navHTML='<div class="bottom-nav">'+
    '<div class="bn-item '+(pg==='home'?'active':'')+'" onclick="go(\'home\')"><div class="bn-icon">🏠</div><span>Home</span></div>'+
    '<div class="bn-item '+(pg==='attendance'?'active':'')+'" onclick="go(\'attendance\')"><div class="bn-icon">📋</div><span>Attendance</span></div>'+
    '<div class="bn-item '+(pg==='marks'?'active':'')+'" onclick="go(\'marks\')"><div class="bn-icon">📊</div><span>Marks</span></div>'+
    '<div class="bn-item '+(pg==='fees'?'active':'')+'" onclick="go(\'fees\')"><div class="bn-icon">💰</div><span>Fees</span></div>'+
    '<div class="bn-item '+(pg==='notices'?'active':'')+'" onclick="go(\'notices\')"><div class="bn-icon">📢</div><span>Notices</span></div>'+
    '</div>';
  var content='';
  var pageTitle='';
  if(pg==='home'){content=pgHome();pageTitle='';}
  else if(pg==='attendance'){content=pgAttendance();pageTitle='My Attendance';}
  else if(pg==='marks'){content=pgMarks();pageTitle='My Results';}
  else if(pg==='fees'){content=pgFees();pageTitle='Fee Status';}
  else if(pg==='notices'){content=pgNotices();pageTitle='Notices';}
  var header=pageTitle?'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
    '<div style="font-size:18px;font-weight:800;color:var(--accent)">'+pageTitle+'</div>'+
    '<button onclick="refreshData()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:12px">🔄 Refresh</button></div>':'';
  document.getElementById('root').innerHTML='<div class="main">'+header+content+'</div>'+navHTML+
    '<div style="position:fixed;top:10px;right:10px;z-index:200;display:flex;gap:6px">'+
    '<button onclick="toggleDark()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px" id="theme-btn">🌙</button>'+
    '<button onclick="doLogout()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--muted);cursor:pointer;font-size:11px">Logout</button></div>';
}

function go(p){pg=p;renderApp();setTimeout(applyDark,10);window.scrollTo(0,0);}

function refreshData(){
  toast('🔄 Refreshing...',false);
  loadDB(function(){renderApp();toast('✅ Updated!',false);});
}

// ── Init ──────────────────────────────────────────────────────────
function toggleDark(){
  var isDark=document.body.classList.toggle('dark-mode');
  localStorage.setItem('pcDark',isDark?'1':'0');
  var btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=isDark?'☀️':'🌙';
}
function applyDark(){
  var isDark=localStorage.getItem('pcDark')==='1';
  if(isDark){document.body.classList.add('dark-mode');}
  var btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=isDark?'☀️':'🌙';
}
function init(){
  document.getElementById('root').innerHTML='<div class="login-wrap"><div class="login-logo">🔥</div><div style="color:var(--muted);font-size:13px">Loading Phoenix Classes...</div></div>';
  applyDark();
  loadDB(function(){
    // Try auto-login from saved session
    var savedId=localStorage.getItem('pcStudentId');
    if(savedId){
      for(var i=0;i<DB.students.length;i++){
        if(String(DB.students[i].id)===String(savedId)){
          currentStudent=DB.students[i];break;
        }
      }
    }
    if(currentStudent){renderApp();}
    else{renderLogin();}
  });
}

window.onload=function(){init();};
</script>
</body>
</html>
