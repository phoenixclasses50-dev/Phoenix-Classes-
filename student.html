<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#f97316"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Phoenix Classes"/>
<title>Phoenix Classes — Student Portal</title>
<style>
:root{--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--accent:#f97316;--accent2:#ea580c;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#eab308;}
.dark-mode{--bg:#0a0d14;--card:#111827;--border:#1f2937;--text:#f1f5f9;--muted:#6b7280;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:Arial,sans-serif;color:var(--text);font-size:14px;min-height:100vh;transition:background .2s,color .2s;}
.main{padding:16px 14px 76px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;height:60px;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:9px;gap:2px;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.card-title{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.stat-num{font-size:22px;font-weight:800;line-height:1;}
.stat-label{font-size:9px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase;}
label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;}
input,select,textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:13px;outline:none;box-sizing:border-box;font-family:Arial,sans-serif;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.btn{color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:Arial,sans-serif;}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.btn-gray{background:var(--border);color:var(--muted);}
.btn-sm{color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;background:#f97316;}
.badge{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;display:inline-block;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 7px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:9px 7px;border-bottom:1px solid var(--border);vertical-align:middle;}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:12px;}
.bar-wrap{margin-bottom:8px;}
.bar-label{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-bg{background:var(--border);border-radius:20px;height:9px;overflow:hidden;}
.bar-fill{height:9px;border-radius:20px;}
.mb{margin-bottom:10px;}
/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#fff7ed,#fff);}
.dark-mode .login-wrap{background:linear-gradient(135deg,#0a0d14,#111827);}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 10px 40px rgba(249,115,22,.1);}
/* ID Card */
.id-card{background:linear-gradient(135deg,#f97316,#ea580c);border-radius:18px;padding:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:14px;}
.id-card::before{content:'🔥';position:absolute;right:-10px;bottom:-20px;font-size:100px;opacity:.1;}
.id-photo{width:70px;height:70px;border-radius:50%;border:3px solid rgba(255,255,255,.5);object-fit:cover;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;}
/* Star student */
.star-banner{background:linear-gradient(135deg,#eab308,#f59e0b);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
/* Rankings */
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
/* Schedule */
.schedule-item{padding:12px;border-radius:10px;margin-bottom:8px;background:var(--bg);border-left:3px solid var(--accent);}
/* Feedback */
.feedback-sent{background:rgba(34,197,94,.1);border:1px solid #22c55e;border-radius:10px;padding:14px;text-align:center;}
/* Notice */
.notice-item{padding:12px;border-radius:10px;background:var(--bg);border-left:3px solid var(--accent);margin-bottom:8px;}
/* Toast */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.err{background:var(--red);}
/* Top bar */
.top-btns{position:fixed;top:10px;right:10px;z-index:200;display:flex;gap:6px;}
.top-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;color:var(--text);}
/* PDF print styles */
@media print{
  .bottom-nav,.top-btns,.btn,.no-print{display:none!important;}
  body{background:#fff!important;color:#000!important;}
  .main{padding:0!important;}
  .card{break-inside:avoid;border:1px solid #ddd!important;box-shadow:none!important;}
}
</style>
</head>

var logoSmSVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 130 480 160" width="32" height="26" style="flex-shrink:0"><defs><linearGradient id="ls1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fde68a"/><stop offset="50%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#b45309"/></linearGradient><linearGradient id="ls2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" style="stop-color:#9a3412"/><stop offset="40%" style="stop-color:#ea580c"/><stop offset="75%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#fbbf24"/></linearGradient></defs><polygon points="340,240 298,278 312,208" fill="url(#ls1)"/><polygon points="340,240 272,270 290,195" fill="#fbbf24" opacity="0.85"/><polygon points="340,240 248,258 270,182" fill="#f59e0b" opacity="0.7"/><polygon points="340,240 382,278 368,208" fill="url(#ls1)"/><polygon points="340,240 408,270 390,195" fill="#fbbf24" opacity="0.85"/><polygon points="340,240 432,258 410,182" fill="#f59e0b" opacity="0.7"/><path d="M340,240 C329,220 323,198 328,174 C332,188 335,200 338,192 C340,178 342,158 336,140 C344,154 349,172 346,188 C350,174 354,158 352,143 C358,158 356,178 350,192 C355,178 360,162 358,148 C364,164 360,186 352,200 C357,188 362,174 360,160 C365,178 360,200 351,212 C347,220 343,230 340,240Z" fill="url(#ls2)"/></svg>';

C351,186 355,172 353,160 C357,175 353,196 347,208 C344,216 342,225 340,234Z" fill="url(#lb3)" opacity="0.9"/></svg>';

var DB={students:[],attendance:{},marks:{tests:[],data:{}},fees:{classFee:{},payments:{}},notices:[],schedule:[],starStudent:null,feedback:[],materials:[]};
var currentStudent=null;
var pg='home';
var loaded=false;

function toast(msg,err){var t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bdg(t,c){return '<span class="badge" style="background:'+c+'22;color:'+c+'">'+t+'</span>';}
function sc(n,l,c){return '<div class="stat-card" style="border-top:3px solid '+c+'"><div class="stat-num" style="color:'+c+'">'+n+'</div><div class="stat-label">'+l+'</div></div>';}
function bar(label,val,max,color){var pct=max>0?Math.round((val/max)*100):0;return '<div class="bar-wrap"><div class="bar-label"><span>'+label+'</span><span style="color:'+color+';font-weight:700">'+val+'/'+max+' ('+pct+'%)</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';}
function fmtDate(str){if(!str)return '';var d=new Date(str);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function getTotalPaid(sid){return(DB.fees.payments[sid]||[]).reduce(function(s,p){return s+(+p.amount||0);},0);}
function getYearlyFee(cls,subject){
  var cf=DB.fees.classFee||{};
  // Try exact key: "Class 10 Semi-English - Maths"
  if(subject){
    var key=cls+' - '+subject;
    if(cf[key]!==undefined&&cf[key]>0)return cf[key];
  }
  // Try without subject (old format)
  if(cf[cls]!==undefined&&cf[cls]>0)return cf[cls];
  // Try matching by class prefix
  if(subject){
    var keys=Object.keys(cf);
    for(var i=0;i<keys.length;i++){
      if(keys[i].indexOf(cls)>=0&&keys[i].indexOf(subject)>=0&&cf[keys[i]]>0)return cf[keys[i]];
    }
  }
  return 0;
}
function toggleDark(){var b=document.body.classList.toggle('dark-mode');localStorage.setItem('pcDark',b?'1':'0');document.getElementById('theme-btn').textContent=b?'☀️':'🌙';}
function applyDark(){if(localStorage.getItem('pcDark')==='1'){document.body.classList.add('dark-mode');setTimeout(function(){var b=document.getElementById('theme-btn');if(b)b.textContent='☀️';},100);}}

// ── Load DB ───────────────────────────────────────────────────────
function loadDB(cb){
  var cbName='sCb'+Date.now(),script=document.createElement('script'),done=false;
  window[cbName]=function(d){
    done=true;delete window[cbName];
    try{document.head.removeChild(script);}catch(e){}
    if(d&&d.status==='ok'&&d.data){
      var ld=d.data;
      if(ld.students)DB.students=ld.students;
      if(ld.attendance)DB.attendance=ld.attendance;
      if(ld.marks)DB.marks=ld.marks;
      if(ld.fees)DB.fees=ld.fees;
      if(ld.notices&&ld.notices.length>0)DB.notices=ld.notices;
      if(ld.schedule)DB.schedule=ld.schedule;
      if(ld.starStudent!==undefined)DB.starStudent=ld.starStudent;
      if(ld.feedback)DB.feedback=ld.feedback;
      if(ld.materials)DB.materials=ld.materials;
    }
    loaded=true;if(cb)cb();
  };
  script.src=API_URL+'?action=load&callback='+cbName+'&t='+Date.now();
  script.onerror=function(){if(!done){delete window[cbName];loaded=true;if(cb)cb();}};
  setTimeout(function(){if(!done){delete window[cbName];try{document.head.removeChild(script);}catch(e){}loaded=true;if(cb)cb();}},15000);
  document.head.appendChild(script);
}

// ── Send Feedback ─────────────────────────────────────────────────
function sendFeedback(){
  var msg=document.getElementById('fb-msg');
  var rating=document.querySelector('input[name="rating"]:checked');
  if(!msg||!msg.value.trim()){toast('Please write your feedback!',true);return;}
  var fbData={
    action:'feedback',
    studentId:currentStudent.id,
    studentName:currentStudent.name,
    cls:currentStudent.cls,
    rating:rating?rating.value:'5',
    message:msg.value.trim(),
    date:new Date().toISOString().slice(0,10)
  };
  var cbName='fbCb'+Date.now(),script=document.createElement('script'),done=false;
  window[cbName]=function(d){done=true;delete window[cbName];try{document.head.removeChild(script);}catch(e){}
    toast('Feedback sent! Thank you 😊',false);render();
  };
  script.src=API_URL+'?action=feedback&callback='+cbName+'&data='+encodeURIComponent(JSON.stringify(fbData))+'&t='+Date.now();
  script.onerror=function(){if(!done){delete window[cbName];toast('Feedback sent! ✅',false);render();}};
  setTimeout(function(){if(!done){delete window[cbName];try{document.head.removeChild(script);}catch(e){}toast('Feedback sent! ✅',false);render();}},10000);
  document.head.appendChild(script);
}

// ── Login ─────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML=
    '<div class="login-wrap">'+
    logoBigSVG+
    '<div style="font-size:24px;font-weight:800;color:var(--accent);margin-bottom:4px">Phoenix Classes</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:28px">Student Portal · Maharashtra Board</div>'+
    '<div class="login-card">'+
    '<div style="font-weight:800;font-size:16px;margin-bottom:4px;text-align:center">Welcome! 👋</div>'+
    '<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px">Login with your registered phone number</div>'+
    '<div class="mb"><label>Phone Number</label><input type="tel" id="login-phone" placeholder="Enter 10-digit number" maxlength="10"/></div>'+
    '<button class="btn btn-orange" onclick="doLogin()">Login →</button>'+
    '<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px">Use the number registered with Phoenix Classes</div>'+
    '</div></div>';
  applyDark();
}

function doLogin(){
  var ph=document.getElementById('login-phone');
  if(!ph||ph.value.length<10){toast('Enter valid 10-digit number!',true);return;}
  var num=ph.value.trim();
  var found=null;
  for(var i=0;i<DB.students.length;i++){
    var s=DB.students[i],sph=String(s.phone||'').replace(/\D/g,'');
    if(sph===num||sph==='91'+num||num==='91'+sph){found=s;break;}
  }
  if(!found){toast('Number not found! Contact teacher.',true);return;}
  currentStudent=found;
  localStorage.setItem('pcStudentId',found.id);
  pg='home';renderApp();
}
function doLogout(){currentStudent=null;localStorage.removeItem('pcStudentId');renderLogin();}

// ── Pages ─────────────────────────────────────────────────────────
function pgHome(){
  var s=currentStudent;
  var attD=0,attP=0;
  for(var k in DB.attendance){if(k.indexOf('_'+s.cls)>=0){var r=DB.attendance[k];if(r[s.id]){attD++;if(r[s.id]==='P')attP++;}}}
  var attPct=attD>0?Math.round((attP/attD)*100):0;
  var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both');});
  var md=DB.marks.data||{},totM=0,obtM=0;
  tests.forEach(function(t){var v=Number((md[t.id]||{})[s.id]||0);if(v){totM+=t.maxMarks;obtM+=v;}});
  var avgPct=totM>0?Math.round((obtM/totM)*100):0;
  var paid=getTotalPaid(s.id),fee=getYearlyFee(s.cls,s.subject),bal=fee-paid;
  var ovG=avgPct>=75?'A':avgPct>=60?'B':avgPct>=40?'C':tests.length>0?'D':'—';
  var gc=ovG==='A'?'#22c55e':ovG==='B'?'#3b82f6':ovG==='C'?'#eab308':'#ef4444';

  // Badges
  var badges=[];
  if(fee>0&&paid>=fee)badges.push({icon:'💰',label:'Fee Clear',color:'#22c55e'});
  if(attPct===100&&attD>0)badges.push({icon:'📅',label:'Perfect Attendance',color:'#3b82f6'});
  if(attPct>=90&&attD>0)badges.push({icon:'🌟',label:'Star Attendance',color:'#6366f1'});
  if(avgPct>=75)badges.push({icon:'🥇',label:'Top Scorer',color:'#f59e0b'});
  if(DB.starStudent&&String(DB.starStudent.id)===String(s.id))badges.push({icon:'⭐',label:'Star Student',color:'#eab308'});
  var badgesHtml=badges.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">'+
    badges.map(function(b){return '<span style="background:'+b.color+'22;color:'+b.color+';border:1px solid '+b.color+'44;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">'+b.icon+' '+b.label+'</span>';}).join('')+'</div>':'';

  // Attendance warning
  var attWarning='';
  if(attPct!==null&&attPct<75&&attD>0){
    attWarning='<div style="background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;gap:10px;align-items:center">'+
      '<div style="font-size:24px">⚠️</div>'+
      '<div><div style="font-weight:800;color:#ef4444;font-size:13px">Attendance Below 75%</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">Your attendance is '+attPct+'%. Please attend classes regularly.</div></div></div>';
  }

  // Mini chart
  var chartBars=tests.slice(-5).map(function(t){
    var v=Number((md[t.id]||{})[s.id]||0);
    var pct=v?Math.round((v/t.maxMarks)*100):0;
    var col=pct>=75?'#22c55e':pct>=60?'#3b82f6':pct>=40?'#eab308':'#ef4444';

  }).join('');

  // Star student banner

      '<div style="font-size:40px">⭐</div>'+

      '<div style="font-size:12px;color:#fef3c7;margin-top:2px">'+esc((DB.starStudent&&DB.starStudent.reason)||'Outstanding performance!')+'</div></div></div>';
  }
  // Upcoming tests
  var today=new Date().toISOString().slice(0,10);
  var upcoming=(DB.schedule||[]).filter(function(sc){return sc.cls===s.cls&&sc.date>=today;}).slice(0,3);
  var scheduleHtml=upcoming.length===0?'':
    '<div class="card"><div class="card-title">📅 Upcoming Tests</div>'+
    upcoming.map(function(sc){
      var daysLeft=Math.ceil((new Date(sc.date)-new Date())/(1000*60*60*24));
      return '<div class="schedule-item">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-weight:800;font-size:13px">'+esc(sc.title)+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+sc.subject+' · '+fmtDate(sc.date)+'</div></div>'+
        '<div style="text-align:center;background:var(--accent);color:#fff;border-radius:8px;padding:4px 10px">'+
        '<div style="font-size:16px;font-weight:800">'+daysLeft+'</div>'+
        '<div style="font-size:9px">days</div></div></div></div>';
    }).join('')+'</div>';
  return starBanner+attWarning+
    '<div class="card" style="background:linear-gradient(135deg,var(--accent),var(--accent2));border:none">'+
    '<div style="display:flex;gap:12px;align-items:center">'+logoSVG+'<div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0">'+esc(s.name[0])+'</div>'+

    '<div style="font-size:11px;color:#fed7aa">'+s.cls+' · '+s.subject+' · Phoenix Classes</div></div></div>'+
    badgesHtml+'</div>'+
    '<div class="grid3">'+sc(attPct+'%','Attendance',attPct<75?'#ef4444':'#22c55e')+sc(ovG,'Grade',gc)+sc(bal<=0?'✓ Clear':'₹'+bal,bal<=0?'Fee OK':'Due',bal<=0?'#22c55e':'#ef4444')+'</div>'+
    '<div class="card"><div class="card-title">📈 Overview</div>'+
    bar('Attendance',attP,attD||1,attPct<75?'#ef4444':'#22c55e')+
    bar('Academic Score',obtM,totM||1,gc)+'</div>'+

function pgRankings(){
  var s=currentStudent;
  var md=DB.marks.data||{};
  var classStudents=DB.students.filter(function(x){return x.cls===s.cls;});
  var ranked=classStudents.map(function(x){
    var tests=(DB.marks.tests||[]).filter(function(t){return t.cls===x.cls&&(t.subject===x.subject||x.subject==='Both');});
    var tot=0,obt=0;
    tests.forEach(function(t){var v=Number((md[t.id]||{})[x.id]||0);if(v){tot+=t.maxMarks;obt+=v;}});
    return{id:x.id,name:x.name,subject:x.subject,pct:tot>0?Math.round((obt/tot)*100):0,obt:obt,tot:tot};
  }).sort(function(a,b){return b.pct-a.pct;});
  var myRank=1;for(var i=0;i<ranked.length;i++){if(String(ranked[i].id)===String(s.id)){myRank=i+1;break;}}
  var medalColors=['#f59e0b','#94a3b8','#cd7f32'];
  var rows=ranked.map(function(r,i){
    var isMe=String(r.id)===String(s.id);
    var medal=i<3?['🥇','🥈','🥉'][i]:(i+1)+'';
    var bgColor=isMe?'rgba(249,115,22,.08)':'transparent';
    return '<div class="rank-item" style="background:'+bgColor+';border-radius:8px;padding:8px 6px">'+
      '<div class="rank-num" style="background:'+(i<3?medalColors[i]:'var(--border)')+';color:'+(i<3?'#fff':'var(--muted)')+'">'+medal+'</div>'+
      '<div style="flex:1"><div style="font-weight:'+(isMe?'800':'600')+';font-size:13px;color:'+(isMe?'var(--accent)':'var(--text)')+'">'+esc(r.name)+(isMe?' (You)':'')+'</div>'+
      '<div style="font-size:10px;color:var(--muted)">'+r.subject+'</div></div>'+
      '<div style="text-align:right"><div style="font-weight:800;color:'+(r.pct>=75?'#22c55e':r.pct>=60?'#3b82f6':r.pct>=40?'#eab308':'#ef4444')+'">'+r.pct+'%</div>'+
      '<div style="font-size:10px;color:var(--muted)">'+r.obt+'/'+r.tot+'</div></div></div>';
  }).join('');
  return '<div class="grid2">'+
    sc('#'+myRank,'Your Rank','#f97316')+
    sc(ranked.length,'Total Students','#3b82f6')+'</div>'+
    '<div class="card"><div class="card-title">🏆 '+s.cls+' Rankings</div>'+rows+'</div>';
}

function pgSchedule(){
  var s=currentStudent;
  var today=new Date().toISOString().slice(0,10);
  var mySchedule=(DB.schedule||[]).filter(function(sc){return sc.cls===s.cls||sc.cls==='All';});
  var upcoming=mySchedule.filter(function(sc){return sc.date>=today;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var past=mySchedule.filter(function(sc){return sc.date<today;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var upHtml=upcoming.length===0?'<div class="empty">No upcoming tests scheduled.</div>':
    upcoming.map(function(sc){
      var daysLeft=Math.ceil((new Date(sc.date)-new Date())/(1000*60*60*24));
      var urgency=daysLeft<=2?'#ef4444':daysLeft<=7?'#eab308':'#22c55e';
      return '<div class="schedule-item" style="border-left-color:'+urgency+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-weight:800;font-size:13px">'+esc(sc.title)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(sc.subject)+' · '+fmtDate(sc.date)+'</div>'+
        (sc.notes?'<div style="font-size:11px;color:var(--muted);margin-top:2px">📝 '+esc(sc.notes)+'</div>':'')+'</div>'+
        '<div style="background:'+urgency+';color:#fff;border-radius:8px;padding:4px 10px;text-align:center">'+
        '<div style="font-size:18px;font-weight:800">'+daysLeft+'</div>'+
        '<div style="font-size:9px">days</div></div></div></div>';
    }).join('');
  var pastHtml=past.length===0?'':
    past.slice(0,5).map(function(sc){
      return '<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">'+
        '<div><div style="font-weight:600;font-size:12px">'+esc(sc.title)+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">'+esc(sc.subject)+' · '+fmtDate(sc.date)+'</div></div>'+
        bdg('Done','#64748b')+'</div>';
    }).join('');
  return '<div class="card"><div class="card-title">📅 Upcoming Tests ('+upcoming.length+')</div>'+upHtml+'</div>'+
    (past.length>0?'<div class="card"><div class="card-title">✅ Past Tests</div>'+pastHtml+'</div>':'');
}

    '<div class="card">'+
    '<div style="display:flex;gap:12px;align-items:center">'+
    '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0">'+esc(s.name[0])+'</div>'+
    '<div><div style="font-size:16px;font-weight:800">'+esc(s.name)+'</div>'+
    '<div style="font-size:12px;color:var(--muted)">'+s.cls+' · '+s.subject+' · ID: PC'+s.id.toString().slice(-6)+'</div></div>'+
    '<div style="margin-left:auto;text-align:center;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:10px;padding:8px 14px">'+
    '<div style="font-size:28px;font-weight:800;color:#fff">'+ovG+'</div>'+
    '<div style="font-size:9px;color:#fed7aa">GRADE</div></div></div></div>'+
    '<div class="grid3">'+
    sc(attPct+'%','Attendance','#22c55e')+sc(avgPct+'%','Avg Score','#3b82f6')+sc(obtM+'/'+totM,'Total Marks','#8b5cf6')+'</div>'+
    '<div class="card"><div class="card-title">📈 Attendance</div>'+bar('Present',attP,attD||1,'#22c55e')+'</div>'+
    '<div class="card"><div class="card-title">📝 Test Results</div>'+

function pgMaterials(){

    '<div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2);display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:10px;color:rgba(255,255,255,.6)">Bahe, Walwa, Dist-Sangli</div>'+
    '<div style="font-size:10px;color:rgba(255,255,255,.6)">9503949009 · 9096815310</div></div>'+
    '<div style="font-size:10px;color:rgba(255,255,255,.6);text-align:right">Maharashtra Board<br>Learn · Think · Grow</div></div></div>'+
    '<button class="btn btn-orange no-print" onclick="window.print()">🖨️ Print / Save ID Card</button>'+
    '<div class="card no-print"><div class="card-title">ℹ️ Student Details</div>'+
    '<table><tbody>'+
    '<tr><td style="color:var(--muted);font-size:12px;width:100px">Name</td><td style="font-weight:700">'+esc(s.name)+'</td></tr>'+
    '<tr><td style="color:var(--muted);font-size:12px">Class</td><td style="font-weight:700">'+s.cls+'</td></tr>'+
    '<tr><td style="color:var(--muted);font-size:12px">Subject</td><td style="font-weight:700">'+s.subject+'</td></tr>'+
    '<tr><td style="color:var(--muted);font-size:12px">Phone</td><td style="font-weight:700">'+esc(s.phone||'—')+'</td></tr>'+
    '<tr><td style="color:var(--muted);font-size:12px">Student ID</td><td style="font-weight:700">PC-'+String(s.id).slice(-6).padStart(6,'0')+'</td></tr>'+
    '</tbody></table></div>';
}

function go(p){pg=p;renderApp();window.scrollTo(0,0);}

function renderApp(){
  var navItems=[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'schedule',icon:'📅',label:'Schedule'},
    {id:'rankings',icon:'🏆',label:'Ranks'},
    {id:'idcard',icon:'📱',label:'ID Card'},
    {id:'more',icon:'📋',label:'More'}
  ];
  var nav='<div class="bottom-nav">'+navItems.map(function(n){
    return '<div class="bn-item '+(pg===n.id?'active':'')+'" onclick="go(\''+n.id+'\')"><div class="bn-icon">'+n.icon+'</div><span>'+n.label+'</span></div>';
  }).join('')+'</div>';
  var content='',title='';
  if(pg==='home'){content=pgHome();title='';}
  else if(pg==='schedule'){content=pgSchedule();title='📅 Test Schedule';}
  else if(pg==='rankings'){content=pgRankings();title='🏆 Class Rankings';}
  else if(pg==='idcard'){content=pgIDCard();title='📱 Student ID Card';}
  else if(pg==='more'){content=pgMore();title='More';}
  var header=title?'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
    '<div style="font-size:17px;font-weight:800;color:var(--accent)">'+title+'</div>'+
    '<button onclick="refreshData()" class="top-btn no-print">🔄</button></div>':'';
  document.getElementById('root').innerHTML=
    '<div class="main">'+header+content+'</div>'+nav+
    '<div class="top-btns no-print">'+
    '<button class="top-btn" id="theme-btn" onclick="toggleDark()">🌙</button>'+
    '<button class="top-btn" onclick="doLogout()" style="font-size:11px;color:var(--muted)">Logout</button></div>';
  applyDark();
}

function pgMore(){
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">'+
    '<div class="card" onclick="go(\'home\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">🏠</div><div style="font-weight:700;margin-top:6px;font-size:13px">Dashboard</div></div>'+
    '<div class="card" onclick="go(\'report\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">📈</div><div style="font-weight:700;margin-top:6px;font-size:13px">Progress Report</div></div>'+
    '<div class="card" onclick="go(\'attendance\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">📋</div><div style="font-weight:700;margin-top:6px;font-size:13px">Attendance</div></div>'+
    '<div class="card" onclick="go(\'marks\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">📊</div><div style="font-weight:700;margin-top:6px;font-size:13px">My Marks</div></div>'+
    '<div class="card" onclick="go(\'fees\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">💰</div><div style="font-weight:700;margin-top:6px;font-size:13px">Fee Status</div></div>'+
    '<div class="card" onclick="go(\'notices\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">📢</div><div style="font-weight:700;margin-top:6px;font-size:13px">Notices</div></div>'+
    '<div class="card" onclick="go(\'feedback\')" style="cursor:pointer;text-align:center;padding:20px">'+
    '<div style="font-size:32px">💬</div><div style="font-weight:700;margin-top:6px;font-size:13px">Feedback</div></div>'+
    '</div>';
}

function pgAttendance(){
  var s=currentStudent,records=[];
  for(var k in DB.attendance){if(k.indexOf('_'+s.cls)>=0){var r=DB.attendance[k];if(r[s.id])records.push({date:k.replace('_'+s.cls,''),status:r[s.id]});}}
  records.sort(function(a,b){return b.date.localeCompare(a.date);});
  var pr=records.filter(function(r){return r.status==='P';}).length,ab=records.length-pr;
  var pct=records.length>0?Math.round((pr/records.length)*100):0;
  return '<div class="grid3">'+sc(pr,'Present','#22c55e')+sc(ab,'Absent','#ef4444')+sc(pct+'%','%','#3b82f6')+'</div>'+
    '<div class="card"><div class="card-title">📋 Attendance Log</div>'+
    (records.length===0?'<div class="empty">No records yet.</div>':
    '<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>'+
    records.map(function(r){return '<tr><td>'+fmtDate(r.date)+'</td><td>'+(r.status==='P'?bdg('Present','#22c55e'):bdg('Absent','#ef4444'))+'</td></tr>';}).join('')+
    '</tbody></table>')+'</div>';
}

function pgMarks(){
  var s=currentStudent,tests=(DB.marks.tests||[]).filter(function(t){return t.cls===s.cls&&(t.subject===s.subject||s.subject==='Both');});
  var md=DB.marks.data||{},totM=0,obtM=0;
  var rows=tests.length===0?'<tr><td colspan="5" class="empty">No test results yet.</td></tr>':
    tests.map(function(t){var v=Number((md[t.id]||{})[s.id]||0);var pct=v?Math.round((v/t.maxMarks)*100):0;
      var g=!v?'—':pct>=75?'A':pct>=60?'B':pct>=40?'C':'D';var gc=g==='A'?'#22c55e':g==='B'?'#3b82f6':g==='C'?'#eab308':g==='D'?'#ef4444':'var(--muted)';
      if(v){totM+=t.maxMarks;obtM+=v;}
      return '<tr><td style="font-weight:700">'+esc(t.testName)+'</td><td>'+t.subject+'</td><td>'+v+'/'+t.maxMarks+'</td><td>'+pct+'%</td><td>'+bdg(g,gc)+'</td></tr>';
    }).join('');
  var avg=totM>0?Math.round((obtM/totM)*100):0;
  var ovG=avg>=75?'A':avg>=60?'B':avg>=40?'C':tests.length>0?'D':'—';
  var gc2=ovG==='A'?'#22c55e':ovG==='B'?'#3b82f6':ovG==='C'?'#eab308':'#ef4444';
  return '<div class="grid2">'+sc(avg+'%','Average',gc2)+sc(ovG,'Grade',gc2)+'</div>'+
    '<div class="card"><div class="card-title">📝 Test Results</div>'+
    '<table><thead><tr><th>Test</th><th>Sub</th><th>Marks</th><th>%</th><th>Grade</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function pgFees(){
  var s=currentStudent,pays=DB.fees.payments[s.id]||[];
  var paid=getTotalPaid(s.id),fee=getYearlyFee(s.cls,s.subject),bal=fee-paid;
  var upiUrl='upi://pay?pa=9503949009%40ybl&pn=Phoenix%20Classes&am='+Math.max(bal,0)+'&cu=INR&tn=Fee%20Payment%20'+encodeURIComponent(s.name);
  return '<div class="grid3">'+sc('₹'+fee,'Total Fee','#3b82f6')+sc('₹'+paid,'Paid','#22c55e')+sc(bal<=0?'₹0':'₹'+bal,bal<=0?'Cleared':'Balance',bal<=0?'#22c55e':'#ef4444')+'</div>'+
    (bal>0?'<button class="btn" style="background:#5f259f;margin-bottom:12px" onclick="window.open(\''+upiUrl+'\',\'_blank\')">📱 Pay ₹'+bal+' via UPI (PhonePe / GPay)</button>':
    '<div style="background:rgba(34,197,94,0.1);border:1px solid #22c55e;border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;font-weight:700;color:#22c55e">✅ All Fees Cleared!</div>')+
    '<div class="card"><div class="card-title">💳 Payments</div>'+
    (pays.length===0?'<div class="empty">No payments yet.</div>':
    pays.slice().reverse().map(function(p){return '<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">'+
      '<div><div style="font-weight:700;color:#22c55e">₹'+p.amount+'</div><div style="font-size:10px;color:var(--muted)">'+fmtDate(p.date)+(p.note?' · '+esc(p.note):'')+'</div></div>'+bdg('Paid','#22c55e')+'</div>';}).join(''))+'</div>';
}

function refreshData(){
  toast('🔄 Refreshing...',false);
  loadDB(function(){
    // Update currentStudent data
    if(currentStudent){
      for(var i=0;i<DB.students.length;i++){
        if(String(DB.students[i].id)===String(currentStudent.id)){currentStudent=DB.students[i];break;}
      }
    }
    renderApp();toast('✅ Updated!',false);
  });
}

// Handle extra pages in go()
var _origGo=go;
go=function(p){
  pg=p;
  if(p==='attendance'||p==='marks'||p==='fees'||p==='notices'||p==='report'||p==='feedback'||p==='materials'||p==='idcard'){
    var content='',title='';
    if(p==='attendance'){content=pgAttendance();title='📋 My Attendance';}
    else if(p==='marks'){content=pgMarks();title='📊 My Results';}
    else if(p==='fees'){content=pgFees();title='💰 Fee Status';}
    else if(p==='notices'){content=pgNotices();title='📢 Notices';}
    else if(p==='report'){content=pgReport();title='📈 Progress Report';}
    else if(p==='feedback'){content=pgFeedback();title='💬 Feedback';}
    else if(p==='materials'){content=pgMaterials();title='📝 Study Materials';}
    else if(p==='idcard'){content=pgIDCard();title='📱 Student ID Card';}
    var navItems=[{id:'home',icon:'🏠',label:'Home'},{id:'schedule',icon:'📅',label:'Schedule'},{id:'rankings',icon:'🏆',label:'Ranks'},{id:'idcard',icon:'📱',label:'ID Card'},{id:'more',icon:'📋',label:'More'}];
    var nav='<div class="bottom-nav">'+navItems.map(function(n){return '<div class="bn-item" onclick="go(\''+n.id+'\')"><div class="bn-icon">'+n.icon+'</div><span>'+n.label+'</span></div>';}).join('')+'</div>';
    document.getElementById('root').innerHTML=
      '<div class="main"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<button onclick="go(\'more\')" class="top-btn no-print" style="font-size:11px">← Back</button>'+
      '<div style="font-size:16px;font-weight:800;color:var(--accent)">'+title+'</div>'+
      '<button onclick="refreshData()" class="top-btn no-print">🔄</button></div>'+content+'</div>'+nav+
      '<div class="top-btns no-print"><button class="top-btn" id="theme-btn" onclick="toggleDark()">🌙</button></div>';
    applyDark();window.scrollTo(0,0);
  } else {renderApp();}
};

function init(){
  document.getElementById('root').innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center">'+logoBigSVG+'<div style="color:var(--muted);font-size:13px;margin-top:8px">Loading Phoenix Classes...</div></div>';
  applyDark();
  loadDB(function(){
    var savedId=localStorage.getItem('pcStudentId');
    if(savedId){for(var i=0;i<DB.students.length;i++){if(String(DB.students[i].id)===String(savedId)){currentStudent=DB.students[i];break;}}}
    if(currentStudent){renderApp();}else{renderLogin();}
  });
}
window.onload=function(){init();};
</script>
